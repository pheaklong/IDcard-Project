name: Auto Send Reports to Telegram

on:
  schedule:
    # ផ្ញើរៀងរាល់ថ្ងៃនៅម៉ោង 8:00 ព្រឹក (UTC+7)
    - cron: '0 1 * * *'  # 8:00 AM ICT (1:00 AM UTC)
    - cron: '15 1 * * *' # 8:15 AM ICT
    - cron: '30 1 * * *' # 8:30 AM ICT
    - cron: '45 1 * * *' # 8:45 AM ICT
  # អាច Run ដោយដៃបាន
  workflow_dispatch:

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g axios
          npm install -g xlsx

      - name: Create report script
        run: |
          cat > send-reports.js << 'EOF'
          const axios = require('axios');
          const XLSX = require('xlsx');

          // ========== CONFIGURATION ==========
          // ប្តូរតម្លៃទាំងនេះតាមការកំណត់របស់អ្នក
          const BOT_TOKEN = '7947542376:AAHkKJ-OQNbrI8iArU5h0RgRwzowzTbvlxA';
          const CHAT_ID = '-1002390198977';
          const SUPABASE_URL = 'https://ovvlshbuayykddqrnoqx.supabase.co';
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dmxzaGJ1YXl5a2RkcXJub3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3NjQxODgsImV4cCI6MjA3NjM0MDE4OH0.vWLDFMS16PwZga9mYehVUiL6G0ccnRzdc9OUf2OM76I';
          // =====================================

          async function fetchData(tableName) {
              try {
                  let allData = [];
                  let start = 0;
                  const batchSize = 1000;
                  let hasMore = true;

                  while (hasMore) {
                      const url = `${SUPABASE_URL}/rest/v1/${tableName}?select=*&offset=${start}&limit=${batchSize}`;
                      const response = await fetch(url, {
                          headers: {
                              'apikey': SUPABASE_ANON_KEY,
                              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                          }
                      });
                      if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                      const data = await response.json();
                      if (data && data.length > 0) {
                          allData = allData.concat(data);
                          start += batchSize;
                          if (data.length < batchSize) hasMore = false;
                      } else {
                          hasMore = false;
                      }
                  }
                  return allData;
              } catch (error) {
                  console.error(`Error fetching ${tableName}:`, error);
                  return [];
              }
          }

          async function sendToTelegram(text, fileBuffer, fileName) {
              try {
                  // Send text
                  const textUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                  await axios.post(textUrl, {
                      chat_id: CHAT_ID,
                      text: text,
                      parse_mode: 'HTML'
                  });

                  // Send file if provided
                  if (fileBuffer && fileName) {
                      const formData = new FormData();
                      formData.append('chat_id', CHAT_ID);
                      formData.append('document', new Blob([fileBuffer]), fileName);
                      
                      const fileUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
                      await axios.post(fileUrl, formData, {
                          headers: { 'Content-Type': 'multipart/form-data' }
                      });
                  }
                  return true;
              } catch (error) {
                  console.error('Error sending to Telegram:', error.message);
                  return false;
              }
          }

          function createExcelBuffer(data) {
              try {
                  const ws = XLSX.utils.json_to_sheet(data);
                  const wb = XLSX.utils.book_new();
                  XLSX.utils.book_append_sheet(wb, ws, 'ទិន្នន័យ');
                  return XLSX.write(wb, { bookType: 'xlsx', type: 'buffer' });
              } catch (error) {
                  console.error('Error creating Excel:', error);
                  return null;
              }
          }

          async function sendLateReport() {
              console.log('📊 Sending late report...');
              const data = await fetchData('attendance_reports');
              if (!data || data.length === 0) { console.log('No data'); return; }

              const today = new Date().toISOString().split('T')[0];
              const todayData = data.filter(r => r.date === today);
              if (todayData.length === 0) { console.log('No today data'); return; }

              const excelData = todayData.map((r, i) => ({
                  'ល.រ': i+1,
                  'ឈ្មោះសិស្ស': r.name || 'N/A',
                  'លេខសម្គាល់': r.student_id || 'N/A',
                  'ថ្នាក់': r.class || 'N/A',
                  'ភេទ': r.gender || 'មិនមាន',
                  'បញ្ហា': 'យឺត',
                  'ពេលវេលា': r.scan_time || r.late_time || 'N/A',
                  'កាលបរិច្ឆេទ': new Date(r.date).toLocaleDateString('km-KH')
              }));

              const buffer = createExcelBuffer(excelData);
              if (!buffer) return;

              const text = `📊 <b>របាយការណ៍ទិន្នន័យយឺត</b>\n📅 ${new Date().toLocaleDateString('km-KH')}\n👥 ${todayData.length} នាក់`;
              await sendToTelegram(text, buffer, `ទិន្នន័យ_យឺត_${today}.xlsx`);
              console.log('✅ Late report sent');
          }

          async function sendDisciplineReport() {
              console.log('📊 Sending discipline report...');
              const data = await fetchData('discipline_reports');
              if (!data || data.length === 0) { console.log('No data'); return; }

              const today = new Date().toISOString().split('T')[0];
              const todayData = data.filter(r => r.date === today);
              if (todayData.length === 0) { console.log('No today data'); return; }

              const excelData = todayData.map((r, i) => ({
                  'ល.រ': i+1,
                  'ឈ្មោះសិស្ស': r.name || 'N/A',
                  'លេខសម្គាល់': r.student_id || 'N/A',
                  'ថ្នាក់': r.class || 'N/A',
                  'ភេទ': r.gender || 'មិនមាន',
                  'បញ្ហា': r.discipline_description || 'គ្មាន',
                  'ពេលវេលា': r.scan_time || 'N/A',
                  'កាលបរិច្ឆេទ': new Date(r.date).toLocaleDateString('km-KH')
              }));

              const buffer = createExcelBuffer(excelData);
              if (!buffer) return;

              const text = `📊 <b>របាយការណ៍ទិន្នន័យវិន័យ</b>\n📅 ${new Date().toLocaleDateString('km-KH')}\n👥 ${todayData.length} នាក់`;
              await sendToTelegram(text, buffer, `ទិន្នន័យ_វិន័យ_${today}.xlsx`);
              console.log('✅ Discipline report sent');
          }

          async function sendLateSummary() {
              console.log('📊 Sending late summary...');
              const data = await fetchData('attendance_reports');
              if (!data || data.length === 0) { console.log('No data'); return; }

              const now = new Date();
              const startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
              const endDate = new Date(now.getFullYear(), now.getMonth(), 0);

              const filtered = data.filter(r => {
                  const rd = new Date(r.date);
                  return rd >= startDate && rd <= endDate;
              });
              if (filtered.length === 0) { console.log('No data for last month'); return; }

              const counts = {}, details = {};
              filtered.forEach(r => {
                  const id = r.student_id;
                  if (!counts[id]) { counts[id]=0; details[id]={name:r.name,class:r.class,gender:r.gender||'មិនមាន'}; }
                  counts[id]++;
              });

              const summaryData = Object.keys(counts).map(id => ({
                  'ឈ្មោះសិស្ស': details[id].name,
                  'លេខសម្គាល់': id,
                  'ថ្នាក់': details[id].class,
                  'ភេទ': details[id].gender,
                  'ចំនួនយឺត': counts[id]
              })).sort((a,b) => b['ចំនួនយឺត'] - a['ចំនួនយឺត']);

              const buffer = createExcelBuffer(summaryData);
              if (!buffer) return;

              const monthStr = startDate.toLocaleDateString('km-KH', { month: 'long', year: 'numeric' });
              const totalLate = summaryData.reduce((s,x) => s + x['ចំនួនយឺត'], 0);
              const text = `📊 <b>របាយការណ៍សង្ខេបយឺត</b>\n📅 ខែ: ${monthStr}\n👥 ${summaryData.length} នាក់\n⏱️ សរុប ${totalLate} ដង`;
              await sendToTelegram(text, buffer, `សង្ខេប_យឺត_${now.getMonth()+1}_${now.getFullYear()}.xlsx`);
              console.log('✅ Late summary sent');
          }

          async function sendDisciplineSummary() {
              console.log('📊 Sending discipline summary...');
              const data = await fetchData('discipline_reports');
              if (!data || data.length === 0) { console.log('No data'); return; }

              const now = new Date();
              const startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
              const endDate = new Date(now.getFullYear(), now.getMonth(), 0);

              const filtered = data.filter(r => {
                  const rd = new Date(r.date);
                  return rd >= startDate && rd <= endDate;
              });
              if (filtered.length === 0) { console.log('No data for last month'); return; }

              const counts = {}, details = {}, problems = {};
              filtered.forEach(r => {
                  const id = r.student_id;
                  if (!counts[id]) { counts[id]=0; details[id]={name:r.name,class:r.class,gender:r.gender||'មិនមាន'}; problems[id]={}; }
                  counts[id]++;
                  const p = r.discipline_description || 'គ្មាន';
                  problems[id][p] = (problems[id][p] || 0) + 1;
              });

              const summaryData = Object.keys(counts).map(id => {
                  const mainProblem = Object.keys(problems[id]).reduce((a,b) => problems[id][a] > problems[id][b] ? a : b);
                  return {
                      'ឈ្មោះសិស្ស': details[id].name,
                      'លេខសម្គាល់': id,
                      'ថ្នាក់': details[id].class,
                      'ភេទ': details[id].gender,
                      'ចំនួនវិន័យ': counts[id],
                      'បញ្ហាចម្បង': mainProblem
                  };
              }).sort((a,b) => b['ចំនួនវិន័យ'] - a['ចំនួនវិន័យ']);

              const buffer = createExcelBuffer(summaryData);
              if (!buffer) return;

              const monthStr = startDate.toLocaleDateString('km-KH', { month: 'long', year: 'numeric' });
              const totalDisc = summaryData.reduce((s,x) => s + x['ចំនួនវិន័យ'], 0);
              const text = `📊 <b>របាយការណ៍សង្ខេបវិន័យ</b>\n📅 ខែ: ${monthStr}\n👥 ${summaryData.length} នាក់\n⚠️ សរុប ${totalDisc} ដង`;
              await sendToTelegram(text, buffer, `សង្ខេប_វិន័យ_${now.getMonth()+1}_${now.getFullYear()}.xlsx`);
              console.log('✅ Discipline summary sent');
          }

          // ========== MAIN ==========
          async function main() {
              const now = new Date();
              const hours = now.getHours();
              const minutes = now.getMinutes();
              const time = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
              const day = now.getDate();

              console.log(`🕐 Running at ${time}, day ${day}`);

              // ផ្ញើប្រចាំថ្ងៃ
              if (time === '08:00') await sendLateReport();
              if (time === '08:15') await sendDisciplineReport();

              // ផ្ញើសង្ខេបប្រចាំខែ (ថ្ងៃទី 1)
              if (day === 1) {
                  if (time === '08:30') await sendLateSummary();
                  if (time === '08:45') await sendDisciplineSummary();
              }

              console.log('✅ All done');
          }

          main().catch(console.error);
          EOF

      - name: Run report script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node send-reports.js
