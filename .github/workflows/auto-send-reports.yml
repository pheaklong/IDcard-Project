name: 🤖 Auto Send Reports to Telegram

on:
  # ដំណើរការតាមកាលវិភាគ (ម៉ោង UTC)
  schedule:
    # 8:00 AM ICT = 1:00 AM UTC
    - cron: '0 1 * * *'
    # 8:15 AM ICT = 1:15 AM UTC
    - cron: '15 1 * * *'
    # 8:30 AM ICT = 1:30 AM UTC (ថ្ងៃទី 1 ខែ)
    - cron: '30 1 * * *'
    # 8:45 AM ICT = 1:45 AM UTC (ថ្ងៃទី 1 ខែ)
    - cron: '45 1 * * *'
  
  # អនុញ្ញាតឱ្យដំណើរការដោយដៃ
  workflow_dispatch:
    inputs:
      report_type:
        description: 'ប្រភេទរបាយការណ៍ដែលចង់ផ្ញើ'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - late
          - discipline
          - summary
          - discipline-summary

jobs:
  send-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies and run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          REPORT_TYPE: ${{ github.event.inputs.report_type || 'all' }}
        run: |
          # Create package.json
          echo '{
            "name": "auto-send-reports",
            "version": "1.0.0",
            "dependencies": {
              "axios": "^1.6.2",
              "xlsx": "^0.18.5"
            }
          }' > package.json
          
          # Install dependencies
          npm install
          
          # Create and run the script
          node -e "
          const axios = require('axios');
          const XLSX = require('xlsx');

          // ============================================
          // CONFIGURATION
          // ============================================
          const BOT_TOKEN = process.env.BOT_TOKEN || '7947542376:AAHkKJ-OQNbrI8iArU5h0RgRwzowzTbvlxA';
          const CHAT_ID = process.env.CHAT_ID || '-1002390198977';
          const SUPABASE_URL = 'https://ovvlshbuayykddqrnoqx.supabase.co';
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dmxzaGJ1YXl5a2RkcXJub3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3NjQxODgsImV4cCI6MjA3NjM0MDE4OH0.vWLDFMS16PwZga9mYehVUiL6G0ccnRzdc9OUf2OM76I';
          const REPORT_TYPE = process.env.REPORT_TYPE || 'all';

          // ============================================
          // LOGGING
          // ============================================
          function log(message, type = 'INFO') {
            const timestamp = new Date().toISOString();
            const emoji = type === 'ERROR' ? '❌' : type === 'SUCCESS' ? '✅' : type === 'WARNING' ? '⚠️' : '📊';
            console.log(`${emoji} [${timestamp}] ${type}: ${message}`);
          }

          // ============================================
          // DATA FETCHING
          // ============================================
          async function fetchData(tableName) {
            try {
              log(`Fetching data from ${tableName}...`, 'INFO');
              let allData = [];
              let start = 0;
              const batchSize = 1000;
              let hasMore = true;
              let batchCount = 0;

              while (hasMore) {
                batchCount++;
                const url = `${SUPABASE_URL}/rest/v1/${tableName}?select=*&offset=${start}&limit=${batchSize}`;
                const res = await fetch(url, {
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                  }
                });
                
                if (!res.ok) {
                  throw new Error('HTTP ' + res.status);
                }
                
                const data = await res.json();
                if (data && data.length > 0) {
                  allData = allData.concat(data);
                  start += batchSize;
                  log(`Batch ${batchCount}: ${data.length} records (Total: ${allData.length})`, 'INFO');
                  if (data.length < batchSize) {
                    hasMore = false;
                  }
                } else {
                  hasMore = false;
                }
              }
              
              log(`✅ Loaded ${allData.length} records from ${tableName}`, 'SUCCESS');
              return allData;
            } catch(e) {
              log(`Error fetching from ${tableName}: ${e.message}`, 'ERROR');
              return [];
            }
          }

          // ============================================
          // TELEGRAM SEND
          // ============================================
          async function sendToTelegram(text, buffer, filename) {
            try {
              // Send text message
              await axios.post('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
              });
              log('Text message sent', 'SUCCESS');

              // Send file if provided
              if (buffer && filename) {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('document', new Blob([buffer]), filename);
                await axios.post('https://api.telegram.org/bot' + BOT_TOKEN + '/sendDocument', form, {
                  headers: { 'Content-Type': 'multipart/form-data' }
                });
                log(`File ${filename} sent`, 'SUCCESS');
              }
              return true;
            } catch(e) {
              log(`Send error: ${e.message}`, 'ERROR');
              return false;
            }
          }

          // ============================================
          // EXCEL CREATION
          // ============================================
          function createExcel(data, sheetName = 'ទិន្នន័យ') {
            try {
              if (!data || data.length === 0) {
                log('No data to create Excel', 'WARNING');
                return null;
              }
              const ws = XLSX.utils.json_to_sheet(data);
              const wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, sheetName);
              return XLSX.write(wb, { bookType: 'xlsx', type: 'buffer' });
            } catch(e) {
              log(`Excel error: ${e.message}`, 'ERROR');
              return null;
            }
          }

          // ============================================
          // REPORT FUNCTIONS
          // ============================================
          async function sendLateReport() {
            log('📊 Sending late report...', 'INFO');
            const data = await fetchData('attendance_reports');
            if (!data || data.length === 0) {
              log('No late reports found', 'WARNING');
              return false;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const filtered = data.filter(r => r.date === today);
            
            if (filtered.length === 0) {
              log('No late reports for today', 'WARNING');
              return false;
            }

            const excelData = filtered.map((r, i) => ({
              'ល.រ': i + 1,
              'ឈ្មោះសិស្ស': r.name || 'N/A',
              'លេខសម្គាល់': r.student_id || 'N/A',
              'ថ្នាក់': r.class || 'N/A',
              'ភេទ': r.gender || 'មិនមាន',
              'បញ្ហា': 'យឺត',
              'ពេលវេលា': r.scan_time || r.late_time || 'N/A',
              'កាលបរិច្ឆេទ': new Date(r.date).toLocaleDateString('km-KH')
            }));

            const buffer = createExcel(excelData, 'ទិន្នន័យយឺត');
            if (!buffer) return false;

            const todayStr = new Date().toLocaleDateString('km-KH');
            const msg = `📊 <b>របាយការណ៍ទិន្នន័យយឺត</b>\n📅 កាលបរិច្ឆេទ: ${todayStr}\n👥 ចំនួនទិន្នន័យ: ${filtered.length}`;
            
            const result = await sendToTelegram(msg, buffer, `ទិន្នន័យ_យឺត_${today}.xlsx`);
            log(result ? '✅ Late report sent' : '❌ Failed to send late report', result ? 'SUCCESS' : 'ERROR');
            return result;
          }

          async function sendDisciplineReport() {
            log('📊 Sending discipline report...', 'INFO');
            const data = await fetchData('discipline_reports');
            if (!data || data.length === 0) {
              log('No discipline reports found', 'WARNING');
              return false;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const filtered = data.filter(r => r.date === today);
            
            if (filtered.length === 0) {
              log('No discipline reports for today', 'WARNING');
              return false;
            }

            const excelData = filtered.map((r, i) => ({
              'ល.រ': i + 1,
              'ឈ្មោះសិស្ស': r.name || 'N/A',
              'លេខសម្គាល់': r.student_id || 'N/A',
              'ថ្នាក់': r.class || 'N/A',
              'ភេទ': r.gender || 'មិនមាន',
              'បញ្ហា': r.discipline_description || 'គ្មាន',
              'ពេលវេលា': r.scan_time || 'N/A',
              'កាលបរិច្ឆេទ': new Date(r.date).toLocaleDateString('km-KH')
            }));

            const buffer = createExcel(excelData, 'ទិន្នន័យវិន័យ');
            if (!buffer) return false;

            const todayStr = new Date().toLocaleDateString('km-KH');
            const msg = `📊 <b>របាយការណ៍ទិន្នន័យវិន័យ</b>\n📅 កាលបរិច្ឆេទ: ${todayStr}\n👥 ចំនួនទិន្នន័យ: ${filtered.length}`;
            
            const result = await sendToTelegram(msg, buffer, `ទិន្នន័យ_វិន័យ_${today}.xlsx`);
            log(result ? '✅ Discipline report sent' : '❌ Failed to send discipline report', result ? 'SUCCESS' : 'ERROR');
            return result;
          }

          async function sendLateSummary() {
            log('📊 Sending late summary...', 'INFO');
            const data = await fetchData('attendance_reports');
            if (!data || data.length === 0) {
              log('No data found for late summary', 'WARNING');
              return false;
            }

            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            const end = new Date(now.getFullYear(), now.getMonth(), 0);

            const filtered = data.filter(r => {
              const d = new Date(r.date);
              return d >= start && d <= end;
            });

            if (filtered.length === 0) {
              log('No data for last month', 'WARNING');
              return false;
            }

            const counts = {};
            const details = {};
            const lastDate = {};
            
            filtered.forEach(r => {
              const id = r.student_id;
              if (!counts[id]) {
                counts[id] = 0;
                details[id] = {
                  name: r.name || 'N/A',
                  class: r.class || 'N/A',
                  gender: r.gender || 'មិនមាន'
                };
              }
              counts[id]++;
              const d = new Date(r.date);
              if (!lastDate[id] || d > lastDate[id]) {
                lastDate[id] = d;
              }
            });

            const summaryData = Object.keys(counts)
              .map(id => ({
                'ឈ្មោះសិស្ស': details[id].name,
                'លេខសម្គាល់': id,
                'ថ្នាក់': details[id].class,
                'ភេទ': details[id].gender,
                'ចំនួនយឺត': counts[id],
                'កាលបរិច្ឆេទយឺតចុងក្រោយ': lastDate[id].toLocaleDateString('km-KH', {
                  year: 'numeric', month: 'long', day: 'numeric'
                })
              }))
              .sort((a, b) => b['ចំនួនយឺត'] - a['ចំនួនយឺត']);

            const buffer = createExcel(summaryData, 'សង្ខេបយឺត');
            if (!buffer) return false;

            const month = start.toLocaleDateString('km-KH', { month: 'long', year: 'numeric' });
            const total = summaryData.reduce((s, x) => s + x['ចំនួនយឺត'], 0);
            
            const msg = `📊 <b>របាយការណ៍សង្ខេបយឺត</b>\n📅 ខែ: ${month}\n👥 សិស្សយឺត: ${summaryData.length} នាក់\n⏱️ សរុប ${total} ដង`;
            
            const result = await sendToTelegram(msg, buffer, `សង្ខេប_យឺត_${now.getMonth()+1}_${now.getFullYear()}.xlsx`);
            log(result ? '✅ Late summary sent' : '❌ Failed to send late summary', result ? 'SUCCESS' : 'ERROR');
            return result;
          }

          async function sendDisciplineSummary() {
            log('📊 Sending discipline summary...', 'INFO');
            const data = await fetchData('discipline_reports');
            if (!data || data.length === 0) {
              log('No data found for discipline summary', 'WARNING');
              return false;
            }

            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            const end = new Date(now.getFullYear(), now.getMonth(), 0);

            const filtered = data.filter(r => {
              const d = new Date(r.date);
              return d >= start && d <= end;
            });

            if (filtered.length === 0) {
              log('No data for last month', 'WARNING');
              return false;
            }

            const counts = {};
            const details = {};
            const problems = {};
            const lastDate = {};
            
            filtered.forEach(r => {
              const id = r.student_id;
              if (!counts[id]) {
                counts[id] = 0;
                details[id] = {
                  name: r.name || 'N/A',
                  class: r.class || 'N/A',
                  gender: r.gender || 'មិនមាន'
                };
                problems[id] = {};
              }
              counts[id]++;
              const p = r.discipline_description || 'គ្មាន';
              problems[id][p] = (problems[id][p] || 0) + 1;
              const d = new Date(r.date);
              if (!lastDate[id] || d > lastDate[id]) {
                lastDate[id] = d;
              }
            });

            const summaryData = Object.keys(counts)
              .map(id => {
                const main = Object.keys(problems[id]).reduce((a, b) => 
                  problems[id][a] > problems[id][b] ? a : b
                );
                return {
                  'ឈ្មោះសិស្ស': details[id].name,
                  'លេខសម្គាល់': id,
                  'ថ្នាក់': details[id].class,
                  'ភេទ': details[id].gender,
                  'ចំនួនវិន័យ': counts[id],
                  'បញ្ហាចម្បង': main,
                  'កាលបរិច្ឆេទវិន័យចុងក្រោយ': lastDate[id].toLocaleDateString('km-KH', {
                    year: 'numeric', month: 'long', day: 'numeric'
                  })
                };
              })
              .sort((a, b) => b['ចំនួនវិន័យ'] - a['ចំនួនវិន័យ']);

            const buffer = createExcel(summaryData, 'សង្ខេបវិន័យ');
            if (!buffer) return false;

            const month = start.toLocaleDateString('km-KH', { month: 'long', year: 'numeric' });
            const total = summaryData.reduce((s, x) => s + x['ចំនួនវិន័យ'], 0);
            
            const msg = `📊 <b>របាយការណ៍សង្ខេបវិន័យ</b>\n📅 ខែ: ${month}\n👥 សិស្សវិន័យ: ${summaryData.length} នាក់\n⚠️ សរុប ${total} ដង`;
            
            const result = await sendToTelegram(msg, buffer, `សង្ខេប_វិន័យ_${now.getMonth()+1}_${now.getFullYear()}.xlsx`);
            log(result ? '✅ Discipline summary sent' : '❌ Failed to send discipline summary', result ? 'SUCCESS' : 'ERROR');
            return result;
          }

          // ============================================
          // MAIN EXECUTION
          // ============================================
          async function main() {
            const now = new Date();
            const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const day = now.getDate();
            
            log(`🕐 Running at ${time} UTC, day ${day}`, 'INFO');
            log(`📋 Report type: ${REPORT_TYPE}`, 'INFO');

            let results = [];

            // Daily reports
            if (REPORT_TYPE === 'all' || REPORT_TYPE === 'late') {
              results.push(await sendLateReport());
            }
            if (REPORT_TYPE === 'all' || REPORT_TYPE === 'discipline') {
              results.push(await sendDisciplineReport());
            }

            // Monthly summaries (only on the 1st of each month)
            if (day === 1) {
              if (REPORT_TYPE === 'all' || REPORT_TYPE === 'summary') {
                results.push(await sendLateSummary());
              }
              if (REPORT_TYPE === 'all' || REPORT_TYPE === 'discipline-summary') {
                results.push(await sendDisciplineSummary());
              }
            }

            const successCount = results.filter(r => r === true).length;
            log(`✅ Completed: ${successCount}/${results.length} reports sent successfully`, 'SUCCESS');
            
            if (successCount < results.length) {
              process.exit(1);
            }
          }

          main().catch(error => {
            log(`Fatal error: ${error.message}`, 'ERROR');
            console.error(error.stack);
            process.exit(1);
          });
          "
